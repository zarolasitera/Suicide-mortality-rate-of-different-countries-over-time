<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suicide rate over time — countries</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #111;
    }

    .wrap {
      max-width: 1180px;
      margin: 24px auto;
      padding: 0 18px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 8px 0;

    .chart-box {

    <h1>Suicide rate over time — countries</h1>
